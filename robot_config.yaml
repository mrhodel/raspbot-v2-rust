# ──────────────────────────────────────────────────────────────────
#  Yahboom Raspbot V2  ·  Agent Configuration
#  All physical pin / I2C settings can be overridden here so that
#  no hardware constant is buried inside Python source code.
# ──────────────────────────────────────────────────────────────────

robot:
  name: "RaspbotV2"
  wheel_type: mecanum          # mecanum | differential
  max_speed: 35                # motor duty-cycle limit  0-100
  min_speed: 30                # below this motors stall (RL stalls ~25% on concrete; 30% gives margin)

# ── Kinematics (calibrated 2026-03-18) ────────────────────────────────
kinematics:
  # Measured values at 100% motor duty cycle
  # Phase 14.2.3 calibration test results (wheels ON ground)
  forward_speed_m_s: 1.61      # measured 0.484 m/s @ 30% → 1.61 m/s @ 100%
  rotation_rate_rad_s: 13.7    # measured 4.103 rad/s @ 30% → 13.7 rad/s @ 100% (wheels on floor)

# ── Hardware Abstraction Layer ────────────────────────────────────
hal:
  motor:
    driver: yahboom             # yahboom | simulation
    i2c_bus: 1
    i2c_address: 0x2B          # Yahboom expansion board I2C address (PI5Car_I2CADDR)
    max_speed: 35               # duty-cycle cap passed to YahboomBoard

  ultrasonic:
    # The HC-SR04 is a FIXED front-facing sensor on the chassis.
    # It connects to the Yahboom expansion board (NOT to RPi GPIO).
    # The gimbal is for the CAMERA only – it does not move the ultrasonic.
    i2c_bus: 1
    i2c_address: 0x2B          # same expansion board as motors/servos
    max_range_cm: 400
    min_range_cm: 5            # Empirically confirmed: reliable from ~5 cm; 3-4 cm = transition
                               # zone; < 3 cm = blind spot / MCU wrap-around (returns 478-480 cm)
                               # dist_mm == 0 (no echo) is treated as max_range, not blind spot
    samples_per_reading: 3     # median filter over N acquisitions (1=fastest, 3=more stable)

  gimbal:
    # Servos driven by the Yahboom expansion board via I2C.
    # Servo 1 = pan (horizontal), Servo 2 = tilt (vertical).
    # No PCA9685 or direct GPIO – everything through the board.
    driver: yahboom             # yahboom | simulation
    i2c_bus: 1
    i2c_address: 0x2B          # same expansion board as motors/ultrasonic
    pan_range: [-90, 90]       # degrees from centre
    # Tilt servo is mounted inverted: higher raw = camera up.
    # With tilt_neutral=30 raw, max down range = 30° (raw→0), max up = 80° (raw→110).
    # tilt_range updated from [-45,30] to [-30,30] to match physical limits.
    # Fine-tune tilt_neutral from 30→28 to correct ~1-2° upward mounting offset.
    # Fine-tune pan by adjusting PAN_CENTER const (90→87) for ~2-3° CW chassis offset.
    tilt_range: [-30, 30]
    tilt_neutral: 30           # raw servo angle (0-180) that points camera level (tune to ~28)
    move_speed_deg_s: 120      # max angular velocity (software-limited)
    tilt_home_deg: 25          # camera tilt at startup (degrees, positive=up); tune until horizon is ~upper 40% of frame

  camera:
    # Raspbot V2 ships with a 1MP USB camera on the 2-DOF gimbal.
    driver: usb                # usb | simulation
    device_index: 0            # fallback if device_path is empty
    device_path: /dev/v4l/by-id/usb-DHZJ-240229-XH_Integrated_Webcam_HD-video-index0
    width: 640
    height: 480
    fps: 15
    auto_exposure: true
    # In-process MJPEG stream — open http://<robot-ip>:8080/ in a browser or VLC.
    stream_port: 8080
    stream_enabled: true
    # Rows from the bottom of every frame that are permanently robot body.
    # Set to 0 until calibrated:  camera_test --save-frame /tmp/ref.png
    # Visually count body-intrusion rows in ref.png, then update this value.
    # Perception computes mask_start_row = height - body_mask_bottom_rows.
    body_mask_bottom_rows: 0

  tof:
    # VL53L8CX on bit-banged I2C bus 4 (GPIO 12=SDA, GPIO 13=SCL).
    # Enable in /boot/firmware/config.txt:
    #   dtoverlay=i2c-gpio,bus=4,i2c_gpio_sda=12,i2c_gpio_scl=13,i2c_gpio_delay_us=2
    i2c_bus: 4
    i2c_address: 0x29      # 7-bit (= 0x52 write / 0x53 read in 8-bit notation)
    ranging_mode: 1        # 1=short ≤135 cm (fastest, 5 ms budget), 2=long ≤400 cm
    integration_time_ms: 5 # measurement time budget (5 ms → up to 60 Hz)

# ── Perception ────────────────────────────────────────────────────
perception:
  midas_model_path: models/midas_small.onnx
  depth_out_width:  32         # depth map columns fed to RL state
  depth_out_height: 32         # depth map rows fed to RL state
  depth_mask_rows:  0          # bottom N rows of 32×32 map to zero (body mask)
  num_threads:      4          # ONNX intra-op CPU threads

# ── Mapping ───────────────────────────────────────────────────────
mapping:
  grid:
    resolution_m: 0.05         # metres per cell
    initial_size_cells: 200    # 200×200 → 10 m × 10 m  (faster; expands if needed)
    expand_threshold: 20       # grow when robot < N cells from edge
    expand_amount: 100
    inflate_interval: 10       # run gaussian obstacle inflation every N steps (0=disabled)
    p_prior: 0.50
    p_occ_hit:  0.75           # Keep original — walls need strong confirmation
    p_occ_miss: 0.40           # Keep original — misses should be cautious
    p_occ_min:  0.05
    p_occ_max:  0.95
    obstacle_threshold: 0.65   # Keep original — balanced wall detection
    free_threshold: 0.35
    blur_sigma: 0.8            # Gaussian inflation around obstacles
    decay_rate: 0.002          # 0.001=original (walls stable ~1000s), 0.01=too fast (walls fade in 23s)
                               # 0.002: mapped walls stable ~460 steps (~46s); false obstacles fade ~460 steps

# ── Navigation ────────────────────────────────────────────────────
navigation:
  planner:
    algorithm: astar           # astar | dijkstra
    heuristic: euclidean       # euclidean | manhattan | diagonal
    safety_margin_cells: 2     # keep away from obstacles by N cells
    max_plan_length: 500       # cells; replan if path exceeds
    path_smoothing: true
    smoothing_iterations: 3

  controller:
    lookahead_dist_m: 0.20     # pure-pursuit lookahead
    goal_tolerance_m: 0.10
    angle_kp: 1.2
    linear_kp: 0.8
    max_angular_vel: 60        # motor duty-cycle units
    max_linear_vel: 70

  recovery:
    spin_degrees: 30
    backup_duration_s: 0.5
    max_attempts: 5

# ── Reinforcement Learning ────────────────────────────────────────
rl:
  state:
    # The ultrasonic sensor is FIXED (single forward reading = 1 value).
    # Increasing this to >1 uses a temporal window of past readings.
    ultrasonic_rays: 1         # 1 = current reading only
    visual_feature_dim: 128
    depth_map_flat: 256        # 16×16
    local_map_size: 7          # 7×7 window around robot
    include_velocity: true     # [v_x, v_y, omega]
    include_heading: true      # sin(θ), cos(θ)

  actions:
    # 0-5 → base motion, 6-9 → gimbal, 10 → stop
    names: [forward, backward, strafe_left, strafe_right,
            rotate_left, rotate_right, gimbal_pan_left,
            gimbal_pan_right, gimbal_tilt_up, gimbal_tilt_down, stop]
    base_speed: 55             # duty cycle for forward
    strafe_speed: 35           # lower = fewer cm/step sideways (no side sensors); above RL stall threshold
    reverse_speed: 35          # lower = fewer cm/step backward (no rear sensor); above RL stall threshold
    rotate_speed: 45
    gimbal_step_deg: 10
    # Safety pre-checks for blind directions (robot mode only)
    spin_180_duration_s: 0.7   # timed spin to face rear before reversing; tune on floor
    side_depth_close: 0.75     # depth map value (0-1, higher=closer) above which strafe blocked

  reward:
    exploration_bonus: 0.02     # per newly-revealed cell
    goal_reached: 50.0
    collision_penalty: -50.0
    proximity_penalty_scale: -2.0  # ×(1/dist) when dist < 30 cm
    time_step_cost: -0.01
    smooth_motion_bonus: 0.05  # momentum bonus for repeating same locomotion action
    forward_bonus: 0.5       # per-step bonus for forward action (encourages exploration)
    backward_step_cost: -0.05  # per-step cost for backward action (discourages wall-backing exploit)
    gimbal_step_cost: -0.04    # extra per-step cost for gimbal-only actions (6-9)
    spin_penalty: -0.5        # per-step penalty for sustained rotation/strafe (after 2 consecutive)
    strafe_step_cost: -0.8     # per-step cost for strafing (discourages overuse of strafe in absence of side sensors)

  ppo:
    learning_rate: 3.0e-4
    gamma: 0.99
    gae_lambda: 0.95
    clip_epsilon: 0.2
    value_loss_coeff: 0.5
    entropy_coeff: 0.01
    epochs_per_update: 4
    batch_size: 64
    rollout_steps: 512         # sim training
    hardware_rollout_steps: 64  # robot training (update ~every 1 min of real movement)
    vision_every_n_steps: 3    # run MiDaS depth only every N steps (saves ~600ms/step on Pi CPU)
    hidden_dim: 256
    max_steps_per_episode: 500  # cap episode length during training
    checkpoint_dir: models/checkpoints
    checkpoint_interval: 10   # episodes (works for both sim and hardware)

# ── Agent Orchestrator ────────────────────────────────────────────
agent:
  loop_hz: 10                  # main control loop frequency
  learn_in_run_mode: false     # Enable to update policy weights during 'run' mode (not recommended for deployment)

  safety:
    emergency_stop_cm: 25      # unconditional halt if anything < N cm (25 = gimbal protrusion clearance)
    low_battery_voltage: 6.8   # volts (if voltage monitor available)
    us_slow_m: 0.70            # US range at which speed scaling begins
    us_stop_m: 0.30            # US range → full stop
    emstop_latch_s: 5.0        # emergency stop latch duration (seconds)
    escape_delay_ms: 200       # pause before escape reverse (ms)
    escape_duration_ms: 400    # escape reverse duration (ms)
    escape_rotation_ms: 600    # escape rotation duration (ms)
    clear_hold_s: 0.8          # hysteresis before clearing obstacle_stopped

  crash:
    accel_threshold_m_s2: 15.0  # horizontal accel (m/s²) that counts as a crash impact
    debounce_ms: 2000           # minimum ms between two crash events

  motor:
    watchdog_ms: 500            # motors zero if no command for this many ms

  gimbal:
    sweep_amp_deg: 20.0         # sinusoidal sweep amplitude (degrees)
    sweep_period_s: 4.0         # sinusoidal sweep period (seconds)
    reactive_gain: 10.0         # gain on depth-derived open-side bias
    reactive_cap_deg: 10.0      # max reactive correction per frame (degrees)
    pan_limit_deg: 30.0         # hard pan limit from centre (degrees)

  navigation:
    max_consecutive_failures: 15  # planning failures before goal blacklisted
    goal_blacklist_s: 10          # seconds a blacklisted goal stays blocked

  exploration:
    frontier_min_size: 3       # minimum frontier cells to pursue
    rescan_interval_s: 5.0     # full gimbal sweep period (suppressed during EXECUTE)
    gimbal_scan_steps: 9       # pan positions during sweep
    max_execute_s: 8.0         # max seconds in EXECUTE before timing out to EXPLORE
  logging:
    level: INFO                # DEBUG | INFO | WARNING
    log_dir: logs/
    save_map_interval_s: 30

# ── Simulation ────────────────────────────────────────────────────
sim:
  seed: 42                     # default maze seed (overridden by --seed CLI flag)
  obstacles: 18                # number of random rectangular obstacles (0 = empty room)
  obstacle_slow_m: 0.70        # Nearest-obstacle distance (m) that begins forward speed scaling
  obstacle_stop_m: 0.15        # Nearest-obstacle distance (m) → forward hard stop
  # A* clearance=5 guarantees path cells are ≥5 grid cells (0.25 m) from walls,
  # but with sub-cell robot positioning the actual nearest_m can be as low as ~0.20 m.
  # obstacle_stop_m must be below that (~0.15 m) or A*-planned corridors immediately
  # trigger a hard stop and livelock.  0.15 m = robot radius — genuine collision risk.
  # Sensor noise parameters — calibrate against logs/robot.ndjson deceleration curves
  imu_noise_gyro_rad_s: 0.01   # Gaussian sigma on simulated gyro axes (rad/s)
  imu_noise_accel_m_s2: 0.05   # Gaussian sigma on simulated lateral accel axes (m/s²)
  range_dropout: 0.08          # fraction of pseudo-lidar rays dropped per scan
  range_noise_m: 0.02          # Gaussian sigma on pseudo-lidar range (metres)

# ── IMU Bias Calibration ──────────────────────────────────────────
# Run "robot calibrate" with robot flat and stationary to regenerate.
# Last calibrated: 2026-03-13, 11650 samples.
imu:
  ax_bias:  0.364051
  ay_bias: -0.063712
  az_bias: 10.001171
  gx_bias: -0.012430
  gy_bias:  0.031440
  gz_bias: -0.016137
